name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content package.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content package.json
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = ".*"$', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$version`"" | Set-Content src-tauri/tauri.conf.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          owner: oskarlolpo
          repo: minecraft-p2p-connector
          tagName: ${{ github.ref_name }}
          releaseName: Minecraft P2P Connector ${{ github.ref_name }}
          releaseBody: Direct UDP hole-punching Minecraft Java connector for Windows.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
