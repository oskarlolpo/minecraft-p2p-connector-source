<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blood Paradise Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-[#0f0f0f] text-white">
    <main class="mx-auto flex min-h-screen w-full max-w-[520px] flex-col p-4">
      <section class="app-shell">
        <header class="header-strip">
          <div>
            <p class="eyebrow">Blood Paradise</p>
            <h1 class="mt-2 text-[28px] font-semibold tracking-tight">Hub</h1>
            <p class="mt-2 text-sm text-white/60">P2P matchmaking для Minecraft Java без VPN-адаптеров.</p>
          </div>
          <div class="status-pill" id="connection-state">Offline</div>
        </header>

        <section class="panel mt-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="panel-label">Global Lobby</p>
              <p class="mt-1 text-xs text-white/50">Ably Presence: <span id="ably-state">connecting</span></p>
            </div>
            <button id="refresh-lobby" class="ghost-button">Refresh</button>
          </div>

          <div class="mt-4 grid grid-cols-1 gap-3">
            <label class="field">
              <span class="field-label">Room Name</span>
              <input id="room-name" type="text" maxlength="32" placeholder="Blood Paradise #1" />
            </label>

            <label class="field">
              <span class="field-label">Password</span>
              <input id="room-password" type="password" maxlength="32" placeholder="Optional" />
            </label>
          </div>

          <div class="mt-4 flex gap-3">
            <button id="host-button" class="primary-button flex-1">Host</button>
            <button id="stop-button" class="danger-button flex-1">Stop</button>
          </div>

          <div class="mt-4 info-grid">
            <div class="mini-panel">
              <span class="panel-label">Lobby</span>
              <span id="lobby-count" class="mini-value">0 servers</span>
            </div>
            <div class="mini-panel">
              <span class="panel-label">Endpoint</span>
              <span id="public-endpoint" class="mini-value break-all">n/a</span>
            </div>
          </div>
        </section>

        <section class="panel mt-4 flex-1">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="panel-label">Server Browser</p>
              <p class="mt-1 text-xs text-white/50">Presence list обновляется в realtime.</p>
            </div>
            <div class="mini-value" id="selected-server">No selection</div>
          </div>

          <div id="server-list" class="mt-4 space-y-3"></div>
        </section>

        <section class="panel mt-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="panel-label">Tunnel Status</p>
              <p id="status-note" class="mt-1 text-xs text-white/50">Idle</p>
            </div>
            <div class="mini-value" id="peer-count">0 peers</div>
          </div>

          <div class="mt-3 space-y-2" id="peer-list"></div>
        </section>

        <section class="panel mt-4 flex-1">
          <div class="flex items-center justify-between gap-3">
            <p class="panel-label">Event Log</p>
            <div class="flex items-center gap-3">
              <span class="text-xs text-white/35">professional debugging feed</span>
              <button id="copy-logs" class="ghost-button px-3 py-2 text-xs">Copy Log</button>
            </div>
          </div>
          <div id="logs" class="mt-3 max-h-[200px] space-y-2 overflow-auto"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
